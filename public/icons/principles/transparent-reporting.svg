<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <!-- Data/Analytics visualization -->
  <g>
    <!-- Chart bars -->
    <rect x="14" y="36" width="6" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <rect x="24" y="28" width="6" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <rect x="34" y="20" width="6" height="30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <rect x="44" y="32" width="6" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <!-- Base line -->
    <line x1="12" y1="50" x2="52" y2="50" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <!-- Grid dots for transparency -->
    <circle cx="18" cy="12" r="1.5" fill="currentColor" opacity="0.6"/>
    <circle cx="30" cy="10" r="1.5" fill="currentColor" opacity="0.6"/>
    <circle cx="42" cy="14" r="1.5" fill="currentColor" opacity="0.6"/>
