<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <!-- Organizational hierarchy/governance -->
  <g>
    <!-- Top node -->
    <circle cx="32" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Upper level nodes -->
    <circle cx="16" cy="28" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="48" cy="28" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Lower level nodes -->
    <circle cx="10" cy="44" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="22" cy="44" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="42" cy="44" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="54" cy="44" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <!-- Connection lines -->
    <line x1="32" y1="16" x2="16" y2="24" stroke="currentColor" stroke-width="1.5"/>
    <line x1="32" y1="16" x2="48" y2="24" stroke="currentColor" stroke-width="1.5"/>
    <line x1="16" y1="32" x2="10" y2="41" stroke="currentColor" stroke-width="1.5"/>
    <line x1="16" y1="32" x2="22" y2="41" stroke="currentColor" stroke-width="1.5"/>
    <line x1="48" y1="32" x2="42" y2="41" stroke="currentColor" stroke-width="1.5"/>
    <line x1="48" y1="32" x2="54" y2="41" stroke="currentColor" stroke-width="1.5"/>
  </g>
</svg>
