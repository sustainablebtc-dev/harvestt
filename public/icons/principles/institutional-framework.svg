<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <!-- Building/Institution structure -->
  <g>
    <!-- Main building outline -->
    <rect x="12" y="20" width="40" height="36" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Vertical dividers -->
    <line x1="24" y1="20" x2="24" y2="56" stroke="currentColor" stroke-width="1.5"/>
    <line x1="36" y1="20" x2="36" y2="56" stroke="currentColor" stroke-width="1.5"/>
    <line x1="48" y1="20" x2="48" y2="56" stroke="currentColor" stroke-width="1.5"/>
    <!-- Horizontal dividers for floors -->
    <line x1="12" y1="30" x2="52" y2="30" stroke="currentColor" stroke-width="1.5"/>
    <line x1="12" y1="40" x2="52" y2="40" stroke="currentColor" stroke-width="1.5"/>
    <!-- Roof peak -->
    <polygon points="32,12 12,20 52,20" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Door/entrance -->
    <rect x="29" y="44" width="6" height="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
  </g>
</svg>
