<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <!-- Long-term vision/growth trajectory -->
  <g>
    <!-- Ascending path/trend -->
    <path d="M14 48 L24 36 L34 42 L50 16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow head pointing forward -->
    <polygon points="54,12 48,16 52,22" fill="currentColor"/>
    <!-- Milestone markers -->
    <circle cx="14" cy="48" r="2.5" fill="currentColor"/>
    <circle cx="24" cy="36" r="2.5" fill="currentColor"/>
    <circle cx="34" cy="42" r="2.5" fill="currentColor"/>
    <circle cx="50" cy="16" r="2.5" fill="currentColor"/>
    <!-- Base reference line -->
    <line x1="10" y1="52" x2="58" y2="52" stroke="currentColor" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>
  </g>
</svg>
